name: Supabase Migration Preflight

on:
  pull_request:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight-dev:
    name: Compare migrations against development
    # Secrets are never made available to forks.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: supabase-dev
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_DEV_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
          test -n "$SUPABASE_DB_PASSWORD"

      - name: Link development project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Compare committed and remote migration histories
        run: supabase migration list --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Dry-run pending migrations
        run: supabase db push --linked --dry-run --password "$SUPABASE_DB_PASSWORD"
